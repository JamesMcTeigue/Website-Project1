<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ive gone to grab a coffee will be back in a bit</title>

  <!-- Describe your page — shows up in search results and browser tabs -->
  <meta name="description" content="A short description of your page goes here.">

  <!-- Your styles -->
  <link rel="stylesheet" href="styles (3).css">

  <style>
    /* Keyboard users need to see where focus is */
    :focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 2px;
    }

    /* Respect users who prefer less motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1 class="title">The alleyway</h1>
  </header>

  
<nav id="draggableNav" aria-label="Primary">
  <ul>
    <li><a href="#" aria-current="page">Home</a></li>
  </ul>
</nav>


  <main id="main-content">
    <div class="underline" aria-hidden="true"></div>
    <p><----content bar will go here</p>
    <button class="main-button" id="myButton" type="button">Button</button>
  </main>

  <footer>
    <small>&copy; <span id="year"></span> Your Name</small>
  </footer>

  <!-- Full-page light overlay — follows mouse, brightens everything via mix-blend-mode -->
  <div id="mouse-light-overlay" aria-hidden="true"></div>

  <!-- Scene floor — sits in front of the brick wall. Add bins/props as children here. -->
  <div id="scene-floor">
    <img src="bin-1.png" alt="rubbish bin" class="scene-prop" id="bin-main">
  </div>

  <script>
    // Keep the copyright year current automatically
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

  <!-- Your scripts -->
  <script src="script (3).js"></script>

</body>
</html>
